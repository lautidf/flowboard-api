paths:
  /organizations/{organizationId}/invitations:
    post:
      summary: Send a user an invitation to join an organization
      tags:
        - Invitations
      parameters:
        - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  $ref: '#/components/schemas/Email'
                role:
                  $ref: '#/components/schemas/Role'
              required:
                - email
      responses:
        '201':
          description: Invitation sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      summary: List all invitations for an organization
      tags:
        - Invitations
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '200':
          description: A list of invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    invitedUser:
                      $ref: '#/components/schemas/User'
                    role:
                      $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /organizations/{organizationId}/invitations/{userId}:
    delete:
      summary: Cancel an invitation
      tags:
        - Invitations
      parameters:
        - $ref: '#/components/parameters/organizationId'
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: Invitation cancelled successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /invitations:
    get:
      summary: List all invitations for the authenticated user
      tags:
        - Invitations
      responses:
        '200':
          description: A list of invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    role:
                      $ref: '#/components/schemas/Role'
                    organization:
                      type: object
                      properties:
                        id:
                          $ref: '#/components/schemas/Id'
                        name:
                          $ref: '#/components/schemas/OrganizationName'
                    sender:
                      type: object
                      properties:
                        email:
                          $ref: '#/components/schemas/Email'
                        name:
                          $ref: '#/components/schemas/UserName'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /invitations/{organizationId}/reject:
    post:
      summary: Reject an invitation to join an organization
      tags:
        - Invitations
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '204':
          description: Invitation rejected successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /invitations/{organizationId}/accept:
    post:
      summary: Accept an invitation to join an organization
      tags:
        - Invitations
      parameters:
        - $ref: '#/components/parameters/organizationId'
      responses:
        '204':
          description: Invitation accepted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'