components:
  securitySchemes:
    bearerHttpAuthentication:
      description: Bearer token using a JWT
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Error message
    Id:
      type: string
      format: cuid
    Role:
      type: string
      enum:
        - ADMIN
        - MEMBER
  responses:
    BadRequest:
      description: The request is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'    
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    NotFound:
      description: A referenced resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
    Conflict:
      description: The request conflicts with the current state of the resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorResponse'
  parameters:
    organizationId:
      name: organizationId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/id'