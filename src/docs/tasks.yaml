paths:
  /projects/{projectId}/tasks:
    post:
      summary: Create a new task
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
              required:
                - title
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      summary: Get all tasks for a project
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/projectId'
        - name: priority
          in: query
          description: Filter tasks by priority
          required: false
          schema:
            $ref: '#/components/schemas/TaskPriority'
        - name: assignedToMe
          in: query
          description: Filter tasks assigned to the current user
          required: false
          schema:
            type: boolean
        - name: unassigned
          in: query
          description: Filter tasks that are unassigned
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /tasks/{taskId}:
    get:
      summary: Get a task by ID
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/taskId'
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update a task by ID
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/taskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  $ref: '#/components/schemas/TaskTitle'
                description:
                  $ref: '#/components/schemas/TaskDescription'
                status:
                  $ref: '#/components/schemas/TaskStatus'
                priority:
                  $ref: '#/components/schemas/TaskPriority'
                assigneeId:
                  $ref: '#/components/schemas/TaskAssigneeId'
                position:
                  $ref: '#/components/schemas/TaskPosition'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a task by ID
      tags:
        - Tasks
      parameters:
        - $ref: '#/components/parameters/taskId'
      responses:
        '204':
          description: Task deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  schemas:
    TaskAssigneeId:
      oneOf:
        - $ref: '#/components/schemas/Id'
        - "null"
    TaskTitle:
      type: string
    TaskDescription:
      type:
        - string
        - "null"
    TaskStatus:
      type: string
      enum:
        - TODO
        - IN_PROGRESS
        - DONE
    TaskPriority:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    TaskPosition:
      type: integer
    Task:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
        title:
          $ref: '#/components/schemas/TaskTitle'
        description:
          $ref: '#/components/schemas/TaskDescription'
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        projectId:
          $ref: '#/components/schemas/Id'
        position:
          $ref: '#/components/schemas/TaskPosition'
        assigneeId:
          $ref: '#/components/schemas/TaskAssigneeId'
  parameters:
    taskId:
      name: taskId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'