name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Touch database
        run: |
          STATUS=$(curl \
            -o /dev/null \
            -s \
            -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"password"}' \
            https://flowboard-api-d0vn.onrender.com)

          echo "Status: $STATUS"

          if [ "$STATUS" != "401" ]; then
            exit 1
          fi